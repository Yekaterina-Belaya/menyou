<div class="grid-viewport-wrapper">

  <cdk-virtual-scroll-viewport [itemSize]="rowHeight" class="recipes-viewport">

    <div *cdkVirtualFor="let row of chunkedRows; trackBy: trackByRow" class="recipe-row">

      @for (recipe of row; track recipe.id) {
        <div class="grid-column">
          <app-recipe-card
            [recipe]="recipe"
            [userId]="1"
            (openDetails)="onOpenDetails($event)"
            (dislike)="onDislikeRecipe($event)">
          </app-recipe-card>
        </div>
      }

    </div>

    @if (hasMoreItems && chunkedRows.length > 0) {
      <div class="load-more-container">
        <button mat-stroked-button color="primary" class="load-more-btn" (click)="onLoadMoreClick()">
          Загрузить еще рецепты
        </button>
      </div>
    }

  </cdk-virtual-scroll-viewport>
</div>
