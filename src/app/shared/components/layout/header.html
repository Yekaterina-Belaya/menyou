<header class="app-header">
  <div class="header-container">
    <div class="header-left">
      <a routerLink="/" class="brand">
        <img src="assets/icons/logo.svg" alt="Menyou Logo" class="logo" />
        <span class="brand-name">Menyou</span>
      </a>
    </div>

    <nav class="header-nav desktop-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Главная
      </a>
      <a routerLink="/recipes" routerLinkActive="active">Рецепты</a>
      <a routerLink="/calculator" routerLinkActive="active">КБЖУ</a>
      <a routerLink="/blog" routerLinkActive="active">Блог</a>
      <a routerLink="/analytics" routerLinkActive="active">Аналитика</a>
    </nav>

    <div class="header-right">
      <!-- Поиск (опционально) -->
      <button mat-icon-button class="search-btn" aria-label="Поиск">
        <mat-icon>search</mat-icon>
      </button>

      <a routerLink="/favorites" mat-icon-button aria-label="Избранное">
        <mat-icon>favorite_border</mat-icon>
      </a>

      <button mat-icon-button aria-label="Уведомления">
        <mat-icon>notifications_none</mat-icon>
        @if (unreadCount > 0) {
          <span class="notification-badge">{{ unreadCount }}</span>
        }
      </button>

      <div class="user-menu" [matMenuTriggerFor]="userMenu">
        <img
          [src]="userAvatar || 'assets/images/default-avatar.png'"
          alt="User Avatar"
          class="user-avatar"
        />
        <span class="user-name">{{ userName || 'Гость' }}</span>
        <mat-icon class="dropdown-icon">expand_more</mat-icon>
      </div>

      <mat-menu #userMenu="matMenu">
        <a mat-menu-item routerLink="/profile">
          <mat-icon>account_circle</mat-icon>
          <span>Профиль</span>
        </a>
        <a mat-menu-item routerLink="/profile/edit">
          <mat-icon>settings</mat-icon>
          <span>Настройки</span>
        </a>
        <a mat-menu-item routerLink="/pricing">
          <mat-icon>stars</mat-icon>
          <span>Тарифы</span>
        </a>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>Выйти</span>
        </button>
      </mat-menu>

      <!-- Кнопка мобильного меню -->
      <button mat-icon-button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Меню">
        <mat-icon>menu</mat-icon>
      </button>
    </div>
  </div>

  <!-- Мобильная навигация -->
  <div class="mobile-nav" [class.open]="isMobileMenuOpen">
    <nav class="mobile-nav-links">
      <a routerLink="/" (click)="closeMobileMenu()">Главная</a>
      <a routerLink="/recipes" (click)="closeMobileMenu()">Рецепты</a>
      <a routerLink="/calculator" (click)="closeMobileMenu()">КБЖУ</a>
      <a routerLink="/blog" (click)="closeMobileMenu()">Блог</a>
      <a routerLink="/analytics" (click)="closeMobileMenu()">Аналитика</a>
    </nav>
  </div>
</header>
