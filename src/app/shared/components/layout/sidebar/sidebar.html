<aside class="app-sidebar">
  <div class="sidebar-top">
    <a routerLink="/" class="brand">
      <img ngSrc="../../../../../assets/icons/logo.svg" alt="Menyou Logo" class="logo" height="380" width="380" priority />
      <span class="brand-name">Menyou</span>
    </a>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.path) {
      <a
        mat-flat-button
        [routerLink]="item.path"
        routerLinkActive="active-nav-btn"
        [routerLinkActiveOptions]="{ exact: item.exact || false }"
        class="nav-item-btn">
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="sidebar-bottom">
    <nav class="profile-links">
      @for (item of profileMenuItems; track item.path) {
        <a mat-button [routerLink]="item.path" routerLinkActive="active-profile-btn" class="profile-item-btn">
          @if (item.icon) {
            <mat-icon>{{ item.icon }}</mat-icon>
          }
          <span>{{ item.label }}</span>
        </a>
      }

      <button mat-button (click)="logout()" class="profile-item-btn logout-btn">
        <mat-icon>exit_to_app</mat-icon>
        <span>Выйти</span>
      </button>
    </nav>
  </div>
</aside>
